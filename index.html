<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Orbit is a student accountability platform using transparent commitment challenges to reduce procrastination." />
    <title>Orbit | Student Accountability</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              orbit: {
                black: '#070A10',
                green: '#7EEBFF',
                gray: '#1A2233',
              },
            },
            fontFamily: {
              sans: ['"Sora"', '"Inter"', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        background-color: #070a10;
        color: white;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #070a10;
      }
      ::-webkit-scrollbar-thumb {
        background: #1a2233;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7eebff;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "framer-motion": "https://esm.sh/framer-motion@^12.30.1",
          "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
          "vite": "https://esm.sh/vite@^7.3.1",
          "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
